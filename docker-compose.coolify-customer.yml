# Coolify customer deploy: Streamlit + persistent SQLite/vector storage (Heroku-style disk).
# Traefik routes to service `report-analyst` on :8080.
# HTTP Basic Auth (optional): injected at deploy time via coolify-provisioning
# (Traefik labels + coolify.traefik.middlewares on this service — not committed to git).
services:
  report-analyst:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REPORT_ANALYST_RUNTIME: ${REPORT_ANALYST_RUNTIME:-core}
      STORAGE_PATH: /app/storage
    volumes:
      - storage-data:/app/storage
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  storage-data:
