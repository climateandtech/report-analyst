# Coolify customer deploy: Streamlit + persistent SQLite/vector storage (Heroku-style disk).
# Traefik routes to service `report-analyst` on :8080.
# HTTP Basic Auth (optional): set TRAEFIK_BASIC_AUTH_USERS on the Coolify app
# (htpasswd line via set-app-http-basic-auth.sh). Per Coolify Custom Middlewares docs.
services:
  report-analyst:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REPORT_ANALYST_RUNTIME: ${REPORT_ANALYST_RUNTIME:-core}
      STORAGE_PATH: /app/storage
    volumes:
      - storage-data:/app/storage
    expose:
      - "8080"
    labels:
      - 'coolify.traefik.middlewares=ra-basic-auth'
      - 'traefik.http.middlewares.ra-basic-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USERS}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  storage-data:
