# Coolify customer deploy: Streamlit + persistent SQLite/vector storage (Heroku-style disk).
# Traefik routes to service `report-analyst` (nginx) which enforces HTTP Basic Auth when
# HTTP_BASIC_AUTH_* env is set, then proxies to internal `report-analyst-app` (Streamlit).
services:
  report-analyst-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REPORT_ANALYST_RUNTIME: ${REPORT_ANALYST_RUNTIME:-core}
      STORAGE_PATH: /app/storage
    volumes:
      - storage-data:/app/storage
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  report-analyst:
    build:
      context: ./docker/nginx-basic-auth
      dockerfile: Dockerfile
    environment:
      UPSTREAM: http://report-analyst-app:8080
      HTTP_BASIC_AUTH_USERNAME: ${HTTP_BASIC_AUTH_USERNAME:-}
      HTTP_BASIC_AUTH_PASSWORD: ${HTTP_BASIC_AUTH_PASSWORD:-}
    depends_on:
      report-analyst-app:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -S -O /dev/null http://127.0.0.1:8080/ 2>&1 | grep -qE 'HTTP/1.1 (200|401)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  storage-data:
