services:
  - type: web
    name: report-analyst
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -m alembic upgrade head || true
      exec streamlit run report_analyst/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: report-analyst-db
          property: connectionString
      - key: USE_ALEMBIC_MIGRATIONS
        value: "true"
      - key: USE_POSTGRES_FILE_STORAGE
        value: "true"
      # OpenRouter OAuth: one-click AI access, no credit card
      - key: USE_OPENROUTER_OAUTH
        value: "true"
      - key: OPENAI_API_BASE
        value: "https://openrouter.ai/api/v1"
      - key: OPENAI_API_MODEL
        value: openai/gpt-4o-mini
      # RENDER_EXTERNAL_URL is set automatically by Render for OAuth callback
      # Optional: override with your own keys for non-OAuth usage
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

databases:
  - name: report-analyst-db
    plan: free
