[tool.isort]
profile = "black"
line_length = 88
skip = ["venv", "venv2", "node_modules", "report_analyst_enterprise", ".git", "__pycache__", "htmlcov", "*.egg-info"]

[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | venv2
  | node_modules
  | report_analyst_enterprise
  | __pycache__
  | \.pytest_cache
  | htmlcov
  | \.eggs
  | \.mypy_cache
  | \.tox
  | dist
  | build
  | \.idea
  | \.vscode
)/
'''
