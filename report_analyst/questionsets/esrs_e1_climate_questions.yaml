name: ESRS E1 Climate Disclosure (DE)
shortcut: esrs-e1
description: ESRS E1 climate and GHG disclosure (German questions). Report-only answers; Not disclosed ≠ No; zero is a valid quantity.
questions:
  - id: esrs_e1_climate_1
    text: "Gibt es eine umfassende Klimastrategie (E1-1 transition plan for climate change mitigation)?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Name the specific plan or program; do not accept generic sustainability or energy strategy as a transition plan
      - State scope coverage (1/2/3) and any limits (e.g. Scope 1+2 only)
      - Include quantified targets and/or target year and SBTi/1.5°C reference if reported
      - If Yes with limitations, still classify Yes and state the limitation in EVIDENCE
      - Product or impact strategy does not replace corporate emissions strategy — classify No
      - Do not accept unverified self-assessment of climate irrelevance without critical review
  - id: esrs_e1_climate_2
    text: "Gibt es entsprechende Policies als Teil einer (umfassenden) Strategie für das Klimamanagement? (E1-2)?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Name the policy explicitly; do not accept vague 'policies exist'
      - Policy must address emissions, energy, supply chain, or climate risks
      - State scope: group-wide, sites, or supply chain
      - General environmental policy counts only if emissions are explicitly addressed
      - Code of Conduct without climate mention is not a climate policy
      - A comprehensive climate strategy (E1-1) is not the same as a climate policy (E1-2)
  - id: esrs_e1_climate_3
    text: "Gibt es entsprechende Maßnahmen als Teil einer (umfassenden) Strategie für das Klimamanagement? (E1-3) (Bestimmung von Hotspots, Erhebung von Zahlen, Reduktionsmaßnahmen; etc.)?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Look for concrete measures: hotspot analysis, data collection, reduction actions
      - Planned or announced measures do not count as existing — note status in EVIDENCE
      - Energy efficiency or renewable energy alone may suffice if tied to emissions reduction
      - Supplier engagement counts if linked to emissions measurement or reduction
      - Generic sustainability initiatives without emissions link → No
  - id: esrs_e1_climate_4
    text: "Für wie viele Tonnen CO2e-Emissionen wurden Carbon Credits gekauft (E1-7 – GHG removals an GHG mitigation projects financed through carbon credits)?"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report tCO2e purchased with reference year when value > 0
      - Do not count RECs or green-electricity certificates as carbon credit purchases
      - Zero tCO2e from SBTi logic or explicit 'no credits purchased' is a valid quantity, not Not disclosed
      - Placeholder values (…, /) are Not disclosed, not zero
  - id: esrs_e1_climate_5
    text: "Gibt es Prozesse, um die Qualität der eingekauften Zertifikate sicherzustellen?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed / Not applicable (Not applicable only when the report shows no carbon credit purchases)
      - Look for quality assurance processes: standard (Gold Standard, VCS), due diligence, retirement policy
      - If the report shows no carbon credit purchases, use Not applicable (deferred: strict F4→F5 chaining requires sequential analysis)
      - Purchased credits without any quality process described → No
      - Third-party verification of credits alone may suffice if explicitly described
  - id: esrs_e1_climate_6
    text: "Gibt es internes Carbon Pricing (E1-8)?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Internal carbon price must be applied in decision-making, not just disclosed aspirationally
      - Shadow price or scenario carbon price counts if used in investment decisions
      - External carbon taxes or EU ETS pass-through alone do not count as internal carbon pricing
      - If price is planned but not yet implemented, classify based on current status
  - id: esrs_e1_climate_7
    text: "Was sind die Gesamtemissionen des Unternehmens (E1-6)?"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report total GHG emissions with unit and reference year
      - Include scope breakdown (1/2/3) in EVIDENCE when reported
      - Location-based vs market-based Scope 2: use the figure the report presents as primary
      - Zero emissions with explanation is a valid value; missing disclosure is Not disclosed
  - id: esrs_e1_climate_8
    text: "Gab es in den letzten Jahren eine Reduktion bei den absoluten CO2e-Emissionen?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Classify on absolute emissions trend over recent years reported
      - Absolute reduction with rising intensity still → Yes for absolute reduction
      - Base-year restatements: use restated series if the report provides it
      - Single-year snapshot without trend → Unclear
  - id: esrs_e1_climate_9
    text: "Scope 1 Emissionen (E1-6) und Entwicklung"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report Scope 1 value with unit and trend (% change or direction) if disclosed
      - Include reference year and methodology note in EVIDENCE when available
      - Biogenic emissions: follow report treatment; do not merge with fossil unless report does
  - id: esrs_e1_climate_10
    text: "Scope 2 Emissionen (E1-6) und Entwicklung"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report Scope 2 value with unit; note location-based vs market-based if both given
      - Green electricity or RECs may reduce market-based Scope 2 — report as stated
      - Include trend (% change) in ANSWER only if the question scope includes development
  - id: esrs_e1_climate_11
    text: "Scope 3 Emissionen (E1-6) Anteil an Gesamtemissionen und Entwicklung"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report Scope 3 total or share of total emissions with unit
      - Include trend or % of total when the report provides it
      - Partial Scope 3 categories: note coverage limits in EVIDENCE
      - New categories added year-on-year may break comparability → note in EVIDENCE
  - id: esrs_e1_climate_12
    text: "Wie hoch ist die CO2-Intensität?"
    guidelines: |
      - ANSWER type: quantity — numeric value with unit (tCO2e, %, EUR/t, etc.) or Unclear / Not disclosed if not reported
      - Report carbon intensity KPI with unit (e.g. tCO2e per revenue, per unit output)
      - Use the intensity metric the report defines as primary
      - Multiple intensity KPIs: pick the most comprehensive disclosed metric
  - id: esrs_e1_climate_13
    text: "Gab es in den letzten Jahren eine Reduktion bei den relativen CO2e-Emissionen (CO2e-Intensität)?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Classify on relative (intensity) emissions trend, not absolute totals
      - Absolute reduction with rising intensity → No for intensity reduction
      - Only absolute reduction reported without intensity KPI → Unclear
  - id: esrs_e1_climate_14
    text: "Gibt es messbare Ziele im CO2e-Emissionsmanagement zur Eindämmung des Klimawandels und Anpassung an den Klimawandel (E1-4)? (z.B. zu Scope 1, 2 und 3)"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Targets must be measurable and emissions-related (Scope 1/2/3 or total)
      - Adaptation-only targets without mitigation do not satisfy mitigation targets question
      - Net-zero ambition without interim quantified targets → evaluate against measurability
      - SBTi targets may satisfy if explicitly linked to E1-4 measurable targets
  - id: esrs_e1_climate_15
    text: "Hat das Unternehmen Science Based Targets gesetzt?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Classify on formal SBTi reference only, not general climate ambition
      - If Yes: include validation status, scope coverage, base year, methodology if reported
      - 1.5°C language without SBTi reference → No
      - Committed vs validated: report status as stated; do not upgrade
  - id: esrs_e1_climate_16
    text: "Werden im Bereich CO2e-Emissionen die wesentlichen IROs (Impacts, Risks, Opportunities) erkannt und adressiert?"
    guidelines: |
      - ANSWER type: classification — exactly one of Yes / No / Unclear / Not disclosed
      - Look for identification of material climate impacts, risks, and opportunities (IROs)
      - Double materiality or impact materiality processes count if emissions-related IROs named
      - Generic risk list without climate-specific IROs → No or Unclear
      - Physical and transition risks should be addressed if material per the report
